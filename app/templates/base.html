<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One Stop Personalized Career & Education Advisor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="{{ page_theme or 'theme-profile' }}">
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm advisor-nav">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('main.profile_input') }}">One Stop Career Advisor</a>
      <span class="badge rounded-pill text-bg-light px-3 py-2 text-primary-emphasis">Intelligent Student Guidance</span>
    </div>
  </nav>

  <section class="step-indicator-wrap">
    <div class="container">
      <div class="step-indicator">
        {% set step_labels = ['Profile', 'Recommendation', 'Skill Gap', 'Suggestions', 'Roadmap'] %}
        {% for i in range(1, 6) %}
          <div class="step-item {{ 'active' if current_step == i else '' }} {{ 'completed' if current_step > i else '' }}">
            <div class="step-dot">{{ i }}</div>
            <div class="step-label">Step {{ i }}: {{ step_labels[i-1] }}</div>
          </div>
        {% endfor %}
      </div>
    </div>
  </section>

  <main class="container py-4 py-md-5">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
